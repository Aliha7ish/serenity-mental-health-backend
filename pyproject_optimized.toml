[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "health-rag-system"
version = "1.0.0"
description = "Optimized FastAPI + Qdrant RAG system for mental health support"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Health RAG Team", email = "support@healthrag.local"}
]

# OPTIMIZED DEPENDENCIES - Production only
# Removed: testing, linting, documentation tools
# Kept: Essential runtime dependencies
dependencies = [
    # Web Framework
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    
    # Database
    "sqlalchemy>=2.0.0",
    "alembic>=1.13.0",
    
    # RAG & NLP
    "sentence-transformers>=2.2.2",  # Core for embeddings
    "qdrant-client>=2.7.0",
    "rank-bm25>=0.2.2",
    "datasets>=2.15.0",
    
    # ML/Data Processing
    "numpy>=1.24.0",
    "pandas>=2.1.0",
    "scikit-learn>=1.3.0",  # BM25 tokenization
    
    # LLM Integration
    "openai>=1.3.0",
    "groq>=0.4.0",
    
    # Utilities
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    
    # Async/Concurrency
    "asyncio-contextmanager>=1.0.0",
]

# OPTIONAL: Lightweight embedding alternative
# Uncomment to use FastEmbed instead of SentenceTransformer
# This reduces model size from 500 MB to ~50 MB
# Optional dependencies that can be installed with: pip install health-rag-system[fastembed]
[project.optional-dependencies]
fastembed = [
    "fastembed>=0.1.0",  # Lightweight embedding model
]

dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.5.0",
    "pytest-cov>=4.1.0",
]

[project.urls]
Homepage = "https://github.com/yourusername/health-rag-system"
Documentation = "https://github.com/yourusername/health-rag-system/blob/main/README.md"
Repository = "https://github.com/yourusername/health-rag-system.git"
Issues = "https://github.com/yourusername/health-rag-system/issues"

# Tool configurations
[tool.black]
line-length = 100
target-version = ["py311", "py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --cov=app --cov-report=html"
asyncio_mode = "auto"
