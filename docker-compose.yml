services:
  # ================================================================
  # Serenity Backend API
  # ================================================================
  app:
    image: serenity-backend:latest
    build:
      context: .
      dockerfile: Dockerfile

    container_name: serenity-backend

    env_file:
      - ./config/.env

    ports:
      - "8000:8000"

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LOG_LEVEL=info

    volumes:
      - ./config:/app/config:ro
      - serenity_logs:/app/logs
      - serenity_huggingface_cache:/home/appuser/.cache/huggingface

    depends_on:
      qdrant:
        condition: service_started

    networks:
      - serenity-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  # ================================================================
  # Qdrant Vector Database
  # ================================================================
  qdrant:
    image: qdrant/qdrant:latest

    container_name: serenity-qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}

    volumes:
      - serenity_qdrant_storage:/qdrant/storage
      - serenity_qdrant_snapshots:/qdrant/snapshots

    networks:
      - serenity-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


volumes:
  serenity_data:
    driver: local

  serenity_logs:
    driver: local

  serenity_qdrant_storage:
    driver: local

  serenity_qdrant_snapshots:
    driver: local

  serenity_huggingface_cache:
    driver: local


networks:
  serenity-network:
    driver: bridge